<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Изумруд — Key Remapper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Изумруд Key Remapper</h1>

  <!-- Step-by-step guide -->
  <section id="guide" class="guide">
    <div class="guide-header">
      <span class="guide-title">How to remap your keyboard</span>
      <button id="guide-toggle" class="guide-toggle" aria-label="Toggle guide">▲</button>
    </div>
    <div id="guide-body" class="guide-body">
      <ol class="steps">
        <li class="step">
          <span class="step-icon">⚡</span>
          <strong>Power on</strong>
          <span class="step-desc">Turn on your Изумруд keyboard</span>
        </li>
        <li class="step step-arrow">›</li>
        <li class="step">
          <span class="step-icon">🔵</span>
          <strong>Connect</strong>
          <span class="step-desc" id="step-connect-desc">Click Connect and select Изумруд</span>
        </li>
        <li class="step step-arrow">›</li>
        <li class="step">
          <span class="step-icon">✏️</span>
          <strong>Remap</strong>
          <span class="step-desc">Click any key on the grid to reassign it</span>
        </li>
        <li class="step step-arrow">›</li>
        <li class="step">
          <span class="step-icon">💾</span>
          <strong>Send</strong>
          <span class="step-desc">Click Send to Keyboard — saved wirelessly</span>
        </li>
      </ol>
      <div id="platform-tip" class="platform-tip" hidden></div>
    </div>
  </section>

  <div class="toolbar">
    <label for="preset-select">Preset:</label>
    <select id="preset-select"></select>

    <div class="layer-tabs">
      <button class="layer-tab active" data-layer="0">Layer 0 — Base</button>
      <button class="layer-tab" data-layer="1">Layer 1 — Fn / Num</button>
    </div>

    <button id="btn-connect">Connect</button>
    <button id="btn-send" disabled>Send to Keyboard</button>

    <span id="status" class="status info">Not connected</span>
  </div>

  <div class="keyboard-wrapper">
    <div id="keyboard-grid"></div>
  </div>

  <!-- Key picker modal -->
  <div id="picker-overlay">
    <div class="picker-modal">
      <div class="picker-header">
        <span id="picker-title">Pick a key</span>
        <input id="picker-search" type="search" placeholder="Search keys…" autocomplete="off" />
        <button id="picker-close" aria-label="Close">✕</button>
      </div>
      <div id="picker-groups"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
